<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Monocular camera imitation learning for space robot arm docking</title>
  <desc id="desc">A monocular camera observes a docking target and trains an imitation policy for robot arm alignment.</desc>
