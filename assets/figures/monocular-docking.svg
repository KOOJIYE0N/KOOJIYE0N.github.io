  <rect x="456" y="208" width="118" height="140" rx="10" fill="#f7fcff" stroke="#c7e5f3" stroke-width="2"/>
  <path d="M480 278h70M515 242v70" stroke="#40b8ad" stroke-width="5" stroke-linecap="round"/>
