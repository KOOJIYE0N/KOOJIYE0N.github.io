  <text x="112" y="164" fill="#5f7180" font-family="Inter, Arial, sans-serif" font-size="18">camera observation to imitation policy</text>
  <rect x="134" y="234" width="130" height="94" rx="18" fill="#e8f6ff" stroke="#43b7e8" stroke-width="3"/>
  <circle cx="198" cy="280" r="28" fill="none" stroke="#146c94" stroke-width="8"/>
  <circle cx="198" cy="280" r="10" fill="#43b7e8"/>
