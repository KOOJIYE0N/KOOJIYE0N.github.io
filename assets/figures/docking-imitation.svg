  <text x="112" y="164" fill="#5f7180" font-family="Inter, Arial, sans-serif" font-size="18">demonstrations to imitation policy</text>
  <rect x="118" y="226" width="170" height="96" rx="16" fill="#e8f6ff" stroke="#43b7e8" stroke-width="3"/>
  <text x="203" y="264" text-anchor="middle" fill="#0f3550" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Bilateral</text>
  <text x="203" y="292" text-anchor="middle" fill="#5f7180" font-family="Inter, Arial, sans-serif" font-size="16">control data</text>
