  <rect x="664" y="226" width="170" height="96" rx="16" fill="#e9fbf8" stroke="#40b8ad" stroke-width="3"/>
  <text x="749" y="264" text-anchor="middle" fill="#0f3550" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Imitation</text>
  <text x="749" y="292" text-anchor="middle" fill="#5f7180" font-family="Inter, Arial, sans-serif" font-size="16">docking policy</text>
